# == CodeSmith development compose file == #
# Defines the infrastructure dependencies that run alongside the API during
# local development. Today that's just Piston (the code execution sandbox).
# When the API itself is containerized for prod, another service will be
# added here and the same file will describe the full topology.

services:
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston_api
    privileged: true                  # Required: Piston uses Linux isolation features (namespaces, cgroups) that need CAP_SYS_ADMIN
    ports:
      - "2000:2000"
    volumes:
      - piston-data:/piston           # Persists installed language packages across container restarts
    environment:
      # Piston caps per-request run/compile timeouts at these values. Requests exceeding
      # them are rejected with HTTP 500 before execution even starts. Keep in sync with
      # CodeExecution:Piston:RunTimeoutMs / CompileTimeoutMs in appsettings.json.
      - PISTON_RUN_TIMEOUT=10000
      - PISTON_COMPILE_TIMEOUT=10000
      - PISTON_OUTPUT_MAX_SIZE=10000
    restart: unless-stopped

volumes:
  piston-data:
